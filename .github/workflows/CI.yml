name: Rust CI & Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo Check
        run: cargo check --all-targets
      - name: Run Tests
        run: cargo test

  build_cross:
    name: Build Cross-Platform
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: http-req-linux
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: http-req-windows.exe
            suffix: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: http-req-macos
            suffix: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p assets
          cp target/${{ matrix.target }}/release/http-req${{ matrix.suffix }} assets/${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: assets/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/') # Cuma jalan kalo push tag
    needs: build_cross
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-assets
          merge-multiple: true
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-assets/*
          name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 Awin-Req ${{ github.ref_name }}
            Release otomatis dari GitHub Actions.
            
            ### Binary:
            - Linux (x86_64)
            - Windows (x86_64)
            - MacOS (Intel/Universal)
          draft: false
          prerelease: false